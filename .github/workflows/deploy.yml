name: Deploy a GitHub Pages

# Publica el export estático de Next.js en GitHub Pages en cada push a main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues concurrentes; deja terminar el que está en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # El sitio vive en https://nologeek.github.io/vitor mientras se usa Pages.
      # Al migrar a dominio propio (nolo.com.co), poner BASE_PATH="" y actualizar SITE_URL.
      NEXT_PUBLIC_BASE_PATH: /vitor
      NEXT_PUBLIC_SITE_URL: https://nologeek.github.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (export estático)
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
